<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador AR - LM ROBÓTICA</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        model-viewer {
            width: 100%;
            height: 90vh;
            background-color: #f0f0f0;
        }
        #ar-button {
            background-color: #4285f4;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
        }
    </style>
</head>
<body>

    <model-viewer 
        src="https://github.com/lmercado2-blip/Proyectos-AR/raw/refs/heads/main/ARBOL.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        tone-mapping="neutral" 
        shadow-intensity="1"
        alt="Un modelo 3D de un árbol para LM ROBÓTICA">
        
        <button slot="ar-button" id="ar-button">
            VER EN TU ESPACIO (AR)
        </button>

    </model-viewer>

</body>
</html>
